<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Vixa Studio AI Image</title>
  <style>
    body {
      background: #070814;
      color: white;
      font-family: Inter, Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 32px;
    }

    .container {
      max-width: 780px;
      margin: auto;
    }

    .panel {
      background: #10172f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.24);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    label,
    .note {
      color: #b0b8d8;
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      background: #0f1b35;
      color: white;
      padding: 16px;
      font-size: 1rem;
      resize: vertical;
    }

    .quality-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .quality-option {
      background: #131d38;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .quality-option input {
      display: none;
    }

    .quality-option.selected {
      border-color: #7b2ff7;
      transform: translateY(-1px);
    }

    .quality-option strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(90deg, #7b2ff7, #b14cff);
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin: 16px 0 0;
      color: #d1d9ff;
      min-height: 22px;
    }

    .result-preview {
      margin-top: 24px;
      border-radius: 22px;
      overflow: hidden;
      background: #0c1730;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .result-preview img {
      display: block;
      width: 100%;
      max-height: 520px;
      object-fit: contain;
    }

    .history {
      margin-top: 32px;
    }

    .history h2 {
      margin-bottom: 14px;
      font-size: 1.2rem;
    }

    .history-list {
      display: grid;
      gap: 18px;
    }

    .history-card {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 14px;
      align-items: start;
      padding: 18px;
      background: #0d1732;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .history-card img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 14px;
      background: #060b18;
    }

    .history-meta {
      display: grid;
      gap: 10px;
    }

    .history-meta p {
      margin: 0;
      line-height: 1.5;
      color: #c5cbe3;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .history-meta time {
      color: #8b95b8;
      font-size: 0.88rem;
    }

    .history-actions button {
      width: auto;
      padding: 10px 16px;
      margin: 0;
      background: rgba(255, 255, 255, 0.06);
      color: white;
    }

    .history-actions button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .note.small {
      font-size: 0.88rem;
      margin-top: 10px;
      color: #8891b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Vixa Studio Image AI</h1>
      <label for="prompt">Describe the image you want</label>
      <textarea id="prompt" placeholder="A cinematic portrait of a cyberpunk fox in neon rain"></textarea>

      <div class="quality-row">
        <label class="quality-option selected" data-value="fast">
          <input type="radio" name="quality" value="fast" checked />
          <strong>Fast</strong>
          ~0.2 credit
        </label>
        <label class="quality-option" data-value="hd">
          <input type="radio" name="quality" value="hd" />
          <strong>HD</strong>
          ~1 credit
        </label>
        <label class="quality-option" data-value="ultra">
          <input type="radio" name="quality" value="ultra" />
          <strong>Ultra</strong>
          ~3 credits
        </label>
      </div>

      <p class="note" id="estimateInfo">Estimated cost: ~0.2 credit</p>
      <button id="generateBtn" onclick="generateImage()">Generate Image</button>
      <p class="status" id="status">Free users get up to 5 images per day.</p>

      <div class="result-preview" id="previewWrapper" style="display:none;">
        <img id="result" alt="Generated image preview" />
      </div>

      <p class="note small">The prompt is polished automatically. If you want exact wording, paste the prompt after generation.</p>
    </div>

    <section class="history">
      <h2>Recent images</h2>
      <div class="history-list" id="historyList">
        <p class="note">No images generated yet.</p>
      </div>
    </section>
  </div>

  <script>
    const qualityOptions = document.querySelectorAll('.quality-option');
    const statusEl = document.getElementById('status');
    const estimateEl = document.getElementById('estimateInfo');
    const previewWrapper = document.getElementById('previewWrapper');
    const resultImage = document.getElementById('result');

    const costMap = {
      fast: '~0.2 credit',
      hd: '~1 credit',
      ultra: '~3 credits'
    };

    function updateEstimate() {
      const selected = document.querySelector('input[name="quality"]:checked').value;
      estimateEl.textContent = `Estimated cost: ${costMap[selected]}`;
    }

    qualityOptions.forEach(option => {
      option.addEventListener('click', () => {
        qualityOptions.forEach(item => item.classList.remove('selected'));
        option.classList.add('selected');
        option.querySelector('input').checked = true;
        updateEstimate();
      });
    });

    async function generateImage() {
      const prompt = document.getElementById('prompt').value.trim();
      const quality = document.querySelector('input[name="quality"]:checked').value;
      if (!prompt) {
        statusEl.textContent = 'Please enter an image prompt.';
        return;
      }

      statusEl.textContent = 'Generating...';
      document.getElementById('generateBtn').disabled = true;
      previewWrapper.style.display = 'none';

      const formData = new FormData();
      formData.append('prompt', prompt);
      formData.append('quality', quality);

      try {
        const res = await fetch('/generate-image', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (!res.ok || data.error) {
          statusEl.textContent = data.error || 'Unable to generate image. Please try again.';
          return;
        }

        resultImage.src = data.image_url;
        previewWrapper.style.display = 'block';
        statusEl.textContent = 'Image ready. Scroll down for history.';
        loadHistory();
      } catch (error) {
        statusEl.textContent = 'Network error. Please try again.';
      } finally {
        document.getElementById('generateBtn').disabled = false;
      }
    }

    function formatTime(iso) {
      try {
        return new Date(iso).toLocaleString([], { hour12: true, month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      } catch (err) {
        return iso;
      }
    }

    function reusePrompt(text) {
      const promptInput = document.getElementById('prompt');
      promptInput.value = text;
      promptInput.focus();
      statusEl.textContent = 'Prompt loaded. Edit or generate again.';
    }

    async function loadHistory() {
      const list = document.getElementById('historyList');
      try {
        const res = await fetch('/image-history');
        const data = await res.json();
        if (!res.ok || !data.success || !Array.isArray(data.history)) {
          list.innerHTML = '<p class="note">Unable to load history.</p>';
          return;
        }

        if (data.history.length === 0) {
          list.innerHTML = '<p class="note">No images generated yet.</p>';
          return;
        }

        list.innerHTML = '';
        data.history.slice(0, 8).forEach(item => {
          const card = document.createElement('div');
          card.className = 'history-card';
          card.innerHTML = `
            <img src="/outputs/${item.filename}" alt="History image" />
            <div class="history-meta">
              <p><strong>Prompt:</strong> ${item.prompt}</p>
              <p><strong>Quality:</strong> ${item.quality.toUpperCase()}</p>
              <time>${formatTime(item.timestamp)}</time>
            </div>
            <div class="history-actions">
              <button type="button" onclick="reusePrompt(${JSON.stringify(item.prompt)})">Reuse</button>
            </div>
          `;
          list.appendChild(card);
        });
      } catch (error) {
        list.innerHTML = '<p class="note">Unable to load history.</p>';
      }
    }

    loadHistory();
    updateEstimate();
  </script>
</body>
</html>
